name: Build APK & OTA update

on:
  push:
    branches: [main, pika]
    paths:
      - "frontend/**"
      - ".github/workflows/build-apk.yml"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version code
        id: version
        working-directory: .
        run: |
          NATIVE_CHANGED=false
          BEFORE_SHA="${{ github.event.before }}"
          if [ -z "$BEFORE_SHA" ] || [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
            NATIVE_CHANGED=true
          elif git diff --name-only "$BEFORE_SHA" "${{ github.sha }}" | grep -qE '^frontend/(android/|capacitor\.config\.ts)'; then
            NATIVE_CHANGED=true
          fi

          CURRENT_VERSION_CODE=$(curl -sS "${{ vars.VERSION_MANIFEST_URL }}?t=$(date +%s)" | jq -r '.files["version.json"].content | fromjson | .versionCode // 0' 2>/dev/null || echo 0)

          if [ "$NATIVE_CHANGED" = "true" ] || [ "$CURRENT_VERSION_CODE" = "0" ] || [ "$CURRENT_VERSION_CODE" = "null" ]; then
            VERSION_CODE=${{ github.run_number }}
          else
            VERSION_CODE=$CURRENT_VERSION_CODE
          fi

          echo "Native changed: $NATIVE_CHANGED, resolved versionCode: $VERSION_CODE"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm install

      - name: Write .env.capacitor
        run: |
          cat <<EOF > .env.capacitor
          BUILD_TARGET=capacitor
          NEXT_PUBLIC_API_BASE_URL=${{ secrets.NEXT_PUBLIC_API_BASE_URL }}
          NEXT_PUBLIC_VERSION_MANIFEST_URL=${{ vars.VERSION_MANIFEST_URL }}
          EOF

      - name: Build web assets + sync Android
        run: npm run cap:sync

      - name: Zip OTA bundle
        run: cd out && zip -r ../update.zip . && cd ..

      - name: Build debug APK
        working-directory: frontend/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug \
            -PappVersionCode=${{ steps.version.outputs.version_code }} \
            -PappVersionName=1.0.${{ github.run_number }}

      - name: Upload APK as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-${{ github.run_number }}
          path: frontend/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Create GitHub release
        id: release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: v${{ github.run_number }}
          files: |
            frontend/update.zip
            frontend/android/app/build/outputs/apk/debug/app-debug.apk
          generate_release_notes: true

      - name: Update version manifest Gist
        run: |
          REPO_URL="https://github.com/${{ github.repository }}/releases/download/v${{ github.run_number }}"
          PAYLOAD=$(cat <<EOF
          {
            "files": {
              "version.json": {
                "content": "{\"versionCode\": ${{ steps.version.outputs.version_code }}, \"versionName\": \"1.0.${{ github.run_number }}\", \"otaUrl\": \"${REPO_URL}/update.zip\", \"apkUrl\": \"${REPO_URL}/app-debug.apk\"}"
              }
            }
          }
          EOF
          )
          curl -sSf -X PATCH \
            -H "Authorization: token ${{ secrets.GIST_TOKEN }}" \
            -H "Content-Type: application/json" \
            "https://api.github.com/gists/${{ secrets.GIST_ID }}" \
            -d "$PAYLOAD"
